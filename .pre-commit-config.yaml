repos:
  - repo: local
    hooks:
      - id: ruff-check-full
        name: ruff-check-full
        entry: uv run ruff check .
        language: system
        pass_filenames: false
      - id: ruff-format-check-full
        name: ruff-format-check-full
        entry: uv run ruff format --check .
        language: system
        pass_filenames: false
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        pass_filenames: false
      - id: ty
        name: ty
        entry: uv run ty check .
        language: system
        pass_filenames: false
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports --config .importlinter
        language: system
        pass_filenames: false
      - id: pydantic-config
        name: pydantic-config
        entry: uv run python scripts/validate_config_with_pydantic.py --config config.yaml
        language: system
        pass_filenames: false
      - id: pytest
        name: pytest
        entry: uv run pytest
        language: system
        pass_filenames: false
