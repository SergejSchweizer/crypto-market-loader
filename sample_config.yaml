global:
  no_json_output: false

env:
  # HTTP client behavior
  DEPTH_HTTP_TIMEOUT_S: 8
  DEPTH_HTTP_MAX_RETRIES: 2
  DEPTH_HTTP_RETRY_BACKOFF_S: 0.5

  # Runtime behavior
  DEPTH_SYNC_LOG_DIR: /volume1/Temp/logs
  DEPTH_FETCH_CONCURRENCY: 6
  DEPTH_FETCH_TASK_TIMEOUT_S: 45

bronze-build:
  exchange: deribit
  exchanges:
    - deribit
  market:
    - spot
    - perp
    - oi
    - funding
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  save_parquet_lake: false
  lake_root: lake/bronze
  # Recommended default for daily operations: only fetch new tail data.
  # Use CLI flag `--full-gap-fill` when you intentionally want deep backfill checks.
  tail_delta_only: true
  no_json_output: false

silver-build:
  bronze_root: lake/bronze
  silver_root: lake/silver
  exchange: deribit
  market:
    - spot
    - perp
    - oi
    - funding
  timeframe: 1m
  manifest: false
  plot: false
  no_json_output: false

gold-build:
  silver_root: lake/silver
  gold_root: lake/gold
  exchange: deribit
  symbols:
    - BTC
    - ETH
    - SOL
  manifest: false
  plot: false
  no_json_output: false

export-descriptive-stats:
  lake_root: lake/bronze
  output_csv: docs/tables/descriptive_stats_baseline.csv
  start_time: "2026-01-01T00:00:00+00:00"
  end_time: "2026-01-31T23:59:59+00:00"
  exchanges:
    - deribit
  symbols:
    - BTCUSDT
    - ETHUSDT
    - SOLUSDT
  timeframes:
    - 1m
  instrument_types:
    - spot
    - perp
  no_json_output: false

list-spot-timeframes:
  exchange: deribit
  exchanges:
    - deribit
